name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        run: bun --filter @grmkris/bull-viewer-api test

      - name: Build UI + bundle guard
        run: bun --filter @grmkris/bull-viewer-ui build
