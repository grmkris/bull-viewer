name: Feature request
description: Suggest something for bull-viewer
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The user-facing pain point, not the proposed solution.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: How you'd want it to work. Sketches and mockups welcome.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
