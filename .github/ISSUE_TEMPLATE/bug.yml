name: Bug report
description: Something is broken in bull-viewer
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Symptoms, error messages, screenshots if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps. Standalone or Next embed? Which package + version?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: bull-viewer version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: bullmq
    attributes:
      label: BullMQ version
      placeholder: "5.73.4"
  - type: input
    id: env
    attributes:
      label: Runtime
      placeholder: "Bun 1.3 / Node 22 / Docker / Next 15"
